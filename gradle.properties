org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official

# Force the Gradle daemon to run on Android Studio's bundled JBR (JDK 21) rather than the
# system JAVA_HOME (JDK 24 on this machine, which AGP 8.5.x does not support). Backslashes
# must be escaped (\\\\) per Java .properties file syntax.
org.gradle.java.home=C:\\Android Studio\\jbr
